{% set name = "datrie" %}
{% set version = "0.8.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ea021ad4c8a8bf14e08a71c7872a622aa399a510f981296825091c7ca0436e80

build:
  number: 0
  script:
    - {{ PYTHON }} -m pip install . --no-deps --ignore-installed  -vvv

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - cython
    - pytest-runner
    - setuptools
  run:
    - python

test:
  imports:
    - datrie

about:
  home: https://github.com/kmike/datrie/
  license: LGPL-2.1-or-later
  license_family: LGPL
  license_file: COPYING
  summary: Super-fast, efficiently stored Trie for Python, uses libdatrie
  doc_url: https://pypi.python.org/pypi/datrie
  dev_url: https://github.com/kmike/datrie/

extra:
  recipe-maintainers:
    - melund
    - tacaswell
